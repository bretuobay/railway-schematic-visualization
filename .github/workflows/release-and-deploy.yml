name: Release And Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: release-and-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full verification gates
        run: |
          npm run check
          npm run check:docs-site
          npm run check:storybook
          npm run check:ci

  package-release:
    runs-on: ubuntu-latest
    needs:
      - verify-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: |
          npm run check:build
          mkdir -p .release
          npm run release:notes -- .release/release-notes.md
          npm run release:manifest -- .release/release-manifest.json
          npm run docs:build
          node scripts/prepare-docs-artifact.mjs .release/pages

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            .release/release-notes.md
            .release/release-manifest.json

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: package-builds
          path: |
            dist/**
            packages/*/dist/**

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .release/pages

  publish-packages:
    runs-on: ubuntu-latest
    needs:
      - package-release
    if: startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish root and workspace packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run check:build
          npm publish --access public
          npm publish --workspaces --if-present --access public

  deploy-docs:
    runs-on: ubuntu-latest
    needs:
      - package-release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release-notes:
    runs-on: ubuntu-latest
    needs:
      - package-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: .release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .release/release-notes.md
          files: .release/release-manifest.json
